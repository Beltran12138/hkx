<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0E0C0B; --bg2: #181614;
    --pink: #FF2D78; --cyan: #00D4FF; --orange: #FF4500;
    --white: #F5F3F0; --dim: #6B6560; --border: #2A2522;
  }
  html, body {
    background: var(--bg); color: var(--white);
    font-family: -apple-system, "PingFang HK", "Noto Sans HK", sans-serif;
    min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
  }
  .wrap { width: 100%; max-width: 480px; padding: 24px 20px 48px; }

  /* ── Lang toggle ── */
  .lang-bar {
    display: flex; justify-content: flex-end;
    padding: 12px 0 4px;
  }
  .lang-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 100px; padding: 5px 14px;
    font-size: 12px; color: var(--dim); cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    letter-spacing: 0.05em;
  }
  .lang-btn:hover { border-color: var(--pink); color: var(--white); }

  /* ── Header ── */
  .header { text-align: center; padding: 20px 0 24px; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.15em;
    color: var(--dim); text-transform: uppercase; margin-bottom: 10px;
  }
  .header h1 {
    font-size: clamp(22px, 6vw, 28px); font-weight: 700;
    line-height: 1.2; color: var(--white);
  }
  .header h1 span { color: var(--pink); }
  .header .sub { font-size: 13px; color: var(--dim); margin-top: 10px; }

  /* ── Progress ── */
  .progress { display: flex; justify-content: center; gap: 6px; margin: 20px 0 28px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
  .dot.active { background: var(--pink); }
  .dot.done { background: var(--dim); }

  /* ── Question card ── */
  .q-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 20px; display: none;
  }
  .q-card.visible { display: block; }
  .q-num { font-size: 11px; color: var(--pink); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .q-text { font-size: clamp(15px, 4.5vw, 18px); font-weight: 600; line-height: 1.4; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; text-align: left; color: var(--white); font-size: 14px;
    line-height: 1.4; cursor: pointer; transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt:hover, .opt:focus { border-color: var(--pink); background: #1A1210; outline: none; }
  .opt:active { background: #200F0F; }

  /* ── Result ── */
  #result { display: none; }
  #result.visible { display: block; }
  .result-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 24px 28px; text-align: center;
  }
  .pizza-emoji { font-size: 56px; margin-bottom: 16px; display: block; }
  .result-label { font-size: 11px; letter-spacing: 0.15em; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; }
  .result-name { font-size: clamp(22px, 7vw, 30px); font-weight: 800; color: var(--pink); line-height: 1.1; margin-bottom: 4px; }
  .result-en { font-size: 12px; color: var(--dim); letter-spacing: 0.08em; margin-bottom: 20px; }
  .result-quote {
    background: var(--bg); border-left: 3px solid var(--pink);
    border-radius: 0 8px 8px 0; padding: 14px 16px; text-align: left;
    font-size: 14px; line-height: 1.6; color: var(--white);
    margin-bottom: 16px; font-style: italic; white-space: pre-line;
  }
  .result-desc { font-size: 13px; color: var(--dim); line-height: 1.6; margin-bottom: 16px; }
  .result-punchline { font-size: 13px; color: var(--cyan); font-weight: 600; margin-bottom: 24px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 20px; }
  .result-tag { font-size: 11px; color: var(--dim); margin-bottom: 20px; }
  .result-tag span { color: var(--pink); }

  .btn-row { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .btn-share {
    background: var(--pink); color: #fff; border: none; border-radius: 12px;
    padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-share:hover { opacity: 0.85; }
  .btn-restart {
    background: transparent; color: var(--dim); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; font-size: 14px; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-restart:hover { border-color: var(--dim); color: var(--white); }

  .footer { margin-top: 40px; text-align: center; font-size: 11px; color: var(--dim); line-height: 1.8; }
  .footer a { color: var(--dim); text-decoration: none; }
  .footer a:hover { color: var(--cyan); }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 100px; padding: 10px 20px; font-size: 13px;
    color: var(--white); transition: transform 0.3s; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>

// ── State ────────────────────────────────────────────────────────
let lang = 'zh';
let scores = [0,0,0,0,0];
let current = 0;
let resultIdx = -1;

// ── Lang toggle ──────────────────────────────────────────────────
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyLang();
}

function applyLang() {
  const s = STRINGS[lang];
  document.documentElement.lang = lang === 'zh' ? 'zh-HK' : 'en';
  document.getElementById('langToggle').textContent = s.langBtn;
  document.getElementById('hEyebrow').textContent = s.eyebrow;
  document.getElementById('hTitle').innerHTML = s.title;
  document.getElementById('hSub').textContent = s.sub;
  document.getElementById('rLabel').textContent = s.resultLabel;
  document.getElementById('btnShare').textContent = s.shareBtn;
  document.getElementById('btnRestart').textContent = s.restartBtn;
  document.getElementById('rTag').innerHTML = s.resultTag;
  document.getElementById('toast').textContent = s.toastMsg;

  // Rebuild questions for current question
  buildQuestions();

  // If result is showing, re-render it
  if (resultIdx >= 0) renderResult(resultIdx);
}

// ── Build questions ──────────────────────────────────────────────
function buildQuestions() {
  const s = STRINGS[lang];
  const container = document.getElementById('questions');
  container.innerHTML = '';

  for (let q = 0; q < 5; q++) {
    const card = document.createElement('div');
    card.className = 'q-card' + (q === current && document.getElementById('result').style.display !== 'block' ? ' visible' : '');
    // If quiz done, don't show questions
    if (resultIdx >= 0) card.classList.remove('visible');

    card.innerHTML = `
      <div class="q-num">${s.qNum[q]}</div>
      <div class="q-text">${s.questions[q]}</div>
      <div class="options">
        ${s.options[q].map((opt, i) =>
          `<button class="opt" onclick="answer(${q},${i})">${opt}</button>`
        ).join('')}
      </div>`;
    container.appendChild(card);
  }
}

// ── Quiz logic ───────────────────────────────────────────────────
function answer(q, persona) {
  scores[persona]++;
  current++;
  updateProgress();

  if (current < 5) {
    const cards = document.querySelectorAll('.q-card');
    cards.forEach(c => c.classList.remove('visible'));
    cards[current].classList.add('visible');
  } else {
    showResult();
  }
}

function updateProgress() {
  for (let i = 0; i < 5; i++) {
    const d = document.getElementById('d' + i);
    d.className = 'dot';
    if (i < current) d.classList.add('done');
    if (i === current) d.classList.add('active');
  }
}

function showResult() {
  let max = -1;
  resultIdx = 0;
  for (let i = 0; i < 5; i++) {
    if (scores[i] > max) { max = scores[i]; resultIdx = i; }
  }
  renderResult(resultIdx);
  document.getElementById('questions').style.display = 'none';
  document.getElementById('headerBlock').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('result').classList.add('visible');
  window.scrollTo(0, 0);
}

function renderResult(idx) {
  const p = PERSONAS[lang][idx];
  document.getElementById('rEmoji').textContent = p.emoji;
  document.getElementById('rName').textContent = p.name;
  document.getElementById('rEn').textContent = p.en;
  document.getElementById('rQuote').textContent = p.quote;
  document.getElementById('rDesc').textContent = p.desc;
  document.getElementById('rPunch').textContent = p.punch;
}

// ── Share ────────────────────────────────────────────────────────
function shareResult() {
  const p = PERSONAS[lang][resultIdx];
  const s = STRINGS[lang];
  const hashtag = lang === 'zh' ? '#你係邊款幣圈人 #PizzaDay2026' : '#CryptoPersona #PizzaDay2026';
  const text = p.shareText + '\nhashkey.com/pizza ' + hashtag;
  const url = 'https://beltran12138.github.io/hkx/quiz/';

  if (navigator.share) {
    navigator.share({ title: s.shareTitle, text, url }).catch(() => copyFallback(text + '\n' + url));
  } else {
    copyFallback(text + '\n' + url);
  }
}

function copyFallback(text) {
  const s = STRINGS[lang];
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showToast);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.textContent = STRINGS[lang].toastMsg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Restart ──────────────────────────────────────────────────────
function restart() {
  scores = [0,0,0,0,0];
  current = 0;
  resultIdx = -1;

  document.getElementById('questions').style.display = '';
  document.getElementById('headerBlock').style.display = '';
  document.getElementById('progressBar').style.display = '';
  document.getElementById('result').classList.remove('visible');

  for (let i = 0; i < 5; i++) {
    document.getElementById('d' + i).className = 'dot';
  }
  document.getElementById('d0').classList.add('active');

  buildQuestions();
  document.querySelector('.q-card').classList.add('visible');
  window.scrollTo(0, 0);
}

// ── Init ─────────────────────────────────────────────────────────
buildQuestions();
document.getElementById('d0').classList.add('active');
document.querySelector('.q-card').classList.add('visible');
</script>
